# Production Docker Compose Configuration
#
# SECURITY NOTE (H5): Kafka uses plaintext protocol within Docker network.
# This is acceptable because:
# 1. All services communicate over isolated Docker bridge network (mirai)
# 2. Kafka is not exposed to public internet (only localhost:29092 for local dev)
# 3. For production deployments requiring encryption, configure SASL_SSL listeners
#    and update KAFKA_LISTENER_SECURITY_PROTOCOL_MAP accordingly.
#
# Network isolation is enforced by the 'mirai' bridge network - only containers
# attached to this network can communicate with Kafka.
#
# RESOURCE LIMITS: Configured for DigitalOcean Basic 2GB Droplet
# Total container memory: ~1.4GB (leaving ~600MB for system overhead)
# - kafka: 512M, inventory-service: 512M, forecasting: 192M, messaging: 128M, caddy: 64M, forecast-cron: 16M

services:
  kafka:
    image: apache/kafka:3.8.1
    container_name: kafka
    ports:
      - "127.0.0.1:29092:29092"  # Localhost only - no external access
    environment:
      # KRaft mode configuration
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller
      # Two listeners: INTERNAL for Docker network, EXTERNAL for host machine
      - KAFKA_LISTENERS=INTERNAL://0.0.0.0:9092,EXTERNAL://0.0.0.0:29092,CONTROLLER://0.0.0.0:9093
      - KAFKA_ADVERTISED_LISTENERS=INTERNAL://kafka:9092,EXTERNAL://localhost:29092
      - KAFKA_INTER_BROKER_LISTENER_NAME=INTERNAL
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - CLUSTER_ID=5L6g3nShT-eMCtK--X86sw
      - KAFKA_LOG_DIRS=/var/lib/kafka/data
      - KAFKA_AUTO_CREATE_TOPICS_ENABLE=true
      # Single-broker defaults: internal topics must use RF=1 or consumer groups will break
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
      # JVM memory limits for 2GB droplet
      - KAFKA_HEAP_OPTS=-Xmx256m -Xms256m
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 256M
    volumes:
      - kafka-data:/var/lib/kafka/data
    dns:
      - 8.8.8.8
      - 8.8.4.4
      - 1.1.1.1
    networks:
      - mirai
    # H1: Healthcheck to detect broker readiness
    # Note: Using lightweight nc (netcat) instead of kafka-broker-api-versions.sh
    # which spawns a JVM and causes OOM issues on 2GB droplets
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "9092"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  inventory-service:
    container_name: inventory-service
    build:
      context: ../services/inventory-service
      dockerfile: Dockerfile
    image: inventory-service:latest
    ports:
      - "127.0.0.1:4000:4000"  # Localhost only - Caddy handles external access
    env_file:
      - ../.env
    environment:
      # JVM memory limits optimized for 512M container on 2GB droplet
      # - Heap: 192m max (reduced to leave room for metaspace)
      # - MaxMetaspaceSize: 256m (increased to avoid OkHttp / Resend metaspace OOM)
      # - ReservedCodeCacheSize: 32m (caps JIT compiler memory)
      # - UseContainerSupport: respect container memory limits
      - JAVA_OPTS=-Xmx192m -Xms128m -XX:+UseG1GC -XX:MaxGCPauseMillis=100 -XX:+UseContainerSupport -XX:MaxMetaspaceSize=256m -XX:ReservedCodeCacheSize=32m
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.75'
        reservations:
          memory: 384M
    dns:
      - 8.8.8.8
      - 8.8.4.4
      - 1.1.1.1
    networks:
      - mirai
    depends_on:
      kafka:
        condition: service_healthy
    # Note: Spring Boot on 2GB droplet takes 2-3 minutes to fully initialize
    # start_period: time before healthchecks count against retries
    # Total allowed: start_period + (retries * interval) = 180 + 150 = 330s
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/actuator/health"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 180s
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  forecasting-service:
    container_name: forecasting-service
    build:
      context: ../services/forecasting-service
      dockerfile: Dockerfile
    image: forecasting-service:latest
    ports:
      - "5010:5000"
    env_file:
      - ../.env
    environment:
      # Kafka settings
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - KAFKA_TOPIC=inventory-changes
      - KAFKA_CONSUMER_GROUP=forecasting-service
      # DLQ settings
      - KAFKA_DLQ_TOPIC=inventory-changes.DLQ
      # Batching settings: tuned for low-volume single-location business (<100 changes/day)
      - BATCH_WINDOW_SECONDS=30        # Max time to wait before processing a batch
      - BATCH_SIZE_TRIGGER=50          # Process immediately if batch reaches this size
      - ITEM_DEBOUNCE_SECONDS=5.0      # Dedupe rapid updates to same item within this window
    deploy:
      resources:
        limits:
          memory: 192M
          cpus: '0.75'
        reservations:
          memory: 128M
    depends_on:
      kafka:
        condition: service_healthy
    dns:
      - 8.8.8.8
      - 8.8.4.4
      - 1.1.1.1
    networks:
      - mirai
    healthcheck:
      # Verify heartbeat file was modified within last 60 seconds
      test: ["CMD-SHELL", "find /tmp/forecasting-worker-heartbeat -mmin -1 2>/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 4
      start_period: 60s
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  messaging-service:
    container_name: messaging-service
    build:
      context: ../services/messaging-service
      dockerfile: Dockerfile
    image: messaging-service:latest
    env_file:
      - ../.env
    environment:
      # Kafka settings
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - KAFKA_TOPIC=inventory-changes
      - KAFKA_CONSUMER_GROUP=messaging-service
      # DLQ settings
      - KAFKA_DLQ_TOPIC=inventory-changes.DLQ
      # Slack settings (SLACK_WEBHOOK_URL comes from env_file)
      - SLACK_CHANNEL=${SLACK_CHANNEL:-#inventory-alerts}
      - SLACK_ENABLED=${SLACK_ENABLED:-true}
      # Alert settings
      - ALERT_DEBOUNCE_SECONDS=${ALERT_DEBOUNCE_SECONDS:-300}
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.25'
        reservations:
          memory: 64M
    depends_on:
      kafka:
        condition: service_healthy
    dns:
      - 8.8.8.8
      - 8.8.4.4
      - 1.1.1.1
    networks:
      - mirai
    healthcheck:
      # Verify heartbeat file was modified within last 60 seconds
      test: ["CMD-SHELL", "find /tmp/messaging-worker-heartbeat -mmin -1 2>/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 4
      start_period: 60s
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  forecast-cron:
    image: alpine:3.21
    container_name: forecast-cron
    entrypoint: /bin/sh
    command:
      - -c
      - |
        echo "0 0 * * * wget -qO- --post-data='' http://forecasting-service:5000/forecasts/trigger > /proc/1/fd/1 2>&1" | crontab -
        echo "forecast-cron: daily recompute scheduled at midnight UTC"
        crond -f -l 6
    deploy:
      resources:
        limits:
          memory: 16M
          cpus: '0.05'
        reservations:
          memory: 8M
    networks:
      - mirai
    depends_on:
      forecasting-service:
        condition: service_healthy
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  caddy:
    image: caddy:2.8-alpine
    container_name: caddy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    networks:
      - mirai
    depends_on:
      inventory-service:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: '0.1'
        reservations:
          memory: 32M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  kafka-data:
  caddy-data:
  caddy-config:

networks:
  mirai:
    driver: bridge
    enable_ipv6: true
