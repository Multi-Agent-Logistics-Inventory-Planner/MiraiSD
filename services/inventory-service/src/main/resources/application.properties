# IMPORTANT: Production deployment must NOT set spring.profiles.active=dev
# Dev profile enables insecure endpoints (DevSecurityConfig, DevSeedController)

spring.application.name=inventory-service
server.port=4000

# SUPABASE CONNECTION (Use environment variables for security)
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=${SUPABASE_DB_URL}
spring.datasource.username=${SUPABASE_DB_USERNAME:postgres}
spring.datasource.password=${SUPABASE_DB_PASSWORD}

# HikariCP Connection Pool
# H6: Pool size of 3 is sufficient for low-volume single-location business
spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.idle-timeout=10000
spring.datasource.hikari.max-lifetime=30000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.keepalive-time=0
spring.datasource.hikari.validation-timeout=5000
spring.datasource.hikari.leak-detection-threshold=60000

# Disable server-side prepared statements
spring.datasource.hikari.data-source-properties.prepareThreshold=0

# SUPABASE Configuration
supabase.jwt.secret=${SUPABASE_JWT_SECRET}
supabase.url=${SUPABASE_URL}
supabase.service.key=${SUPABASE_SERVICE_ROLE}

# JPA Configuration
# show-sql defaults to false for security/performance; set JPA_SHOW_SQL=true for debugging
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Kafka Configuration
spring.kafka.bootstrap-servers=kafka:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.properties.spring.json.add.type.headers=false

# Kafka Topics
kafka.topic.inventory-changes=inventory-changes

# EasyPost Configuration
easypost.api.key=${EASYPOST_API_KEY}

# Resend Email Configuration
resend.api.key=${RESEND_API_KEY}
resend.from.email=${RESEND_FROM_EMAIL:noreply@yourdomain.com}
resend.from.name=${RESEND_FROM_NAME:Mirai Inventory}

# CORS Configuration
cors.allowed.origin=${CORS_ALLOWED_ORIGIN:https://mirai-inventory.vercel.app}

# Rate Limiting
rate.limit.requests.per.minute=${RATE_LIMIT_REQUESTS:250}

# Logging
logging.level.root=info

# Spring Boot Actuator (H3)
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
management.endpoint.health.show-components=always
management.health.diskspace.enabled=true
management.health.db.enabled=true

# Web MVC - Enable trailing slash matching
spring.mvc.pathmatch.matching-strategy=ant_path_matcher
# Throw exception when no handler is found instead of trying to serve as static resource
spring.mvc.throw-exception-if-no-handler-found=true
spring.web.resources.add-mappings=false