# Integration test profile -- uses real PostgreSQL + Kafka via Testcontainers.
# Activated by @ActiveProfiles("integration") on test classes.
# DB and Kafka URLs are injected dynamically via @DynamicPropertySource.

# JWT secret for test token generation
supabase.jwt.secret=test-secret-key-for-jwt-validation-that-is-long-enough-for-hmac-sha-256-algorithm

# Supabase stubs (not used in integration tests)
supabase.url=http://localhost:54321
supabase.service.key=test-service-key

# EasyPost stub
easypost.api.key=test-easypost-key

# Disable scheduled outbox publishing -- tests call it manually
spring.task.scheduling.enabled=false

# Let Hibernate create the schema against real PostgreSQL
spring.jpa.hibernate.ddl-auto=create-drop

# Rate limiting for tests
rate.limit.requests.per.minute=100
